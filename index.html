<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAdea Smart Presence Fleet Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dot-online { @apply h-2.5 w-2.5 rounded-full bg-green-500 mr-2 animate-pulse; }
        .dot-offline { @apply h-2.5 w-2.5 rounded-full bg-red-500 mr-2; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-white">Device Status Monitor</h1>
                <p class="text-gray-400">MDEP Certified Fleet Management</p>
            </div>
            <div id="last-update" class="text-sm text-gray-500">更新中...</div>
        </header>

        <div class="overflow-hidden rounded-lg border border-gray-700 shadow-lg">
            <table class="min-w-full divide-y divide-gray-700 bg-gray-800">
                <thead class="bg-gray-700">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Device ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Location</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Last Seen</th>
                    </tr>
                </thead>
                <tbody id="device-table" class="divide-y divide-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
    let CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCoE7I08iRza6QrUuyDNqA6FFnCuuANjsBf6hogreujMgtZtPld4kichpuA-S592Gw2erVx5xLRCuR/pub?output=csv';

    // 自動修正網址
    if (CSV_URL.includes('/edit')) {
        CSV_URL = CSV_URL.replace(/\/edit.*$/, '/export?format=csv');
    }

    async function fetchData() {
        const tableBody = document.getElementById('device-table');
        const updateStatus = document.getElementById('last-update');

        try {
            updateStatus.innerText = '正在同步數據...';
            const response = await fetch(CSV_URL);
            
            if (!response.ok) throw new Error('網路回應不正常');
            
            const data = await response.text();
            
            // 在開發者工具印出原始資料，方便除錯
            console.log("從 Google Sheets 抓到的原始資料：\n", data);

            const rows = data.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
            
            tableBody.innerHTML = '';

            rows.forEach(row => {
                // 容許逗號或分號分割 (解決 Google Sheets 格式差異)
                const cols = row.split(/,|;/).map(c => c.replace(/"/g, '').trim());
                
                if (cols.length < 3) return;

                const id = cols[0];
                const location = cols[1];
                
                // 動態尋找狀態欄位
                const status = cols.find(c => c.toLowerCase() === 'online' || c.toLowerCase() === 'offline') || 'Unknown';
                
                // 假設最後一個欄位是時間
                const lastSeen = cols[cols.length - 1];

                const isOnline = status.toLowerCase() === 'online';
                const statusClass = isOnline ? 'dot-online' : 'dot-offline';
                const statusTextColor = isOnline ? 'text-green-400' : 'text-red-400';

                tableBody.innerHTML += `
                    <tr class="hover:bg-gray-700 transition-colors border-b border-gray-700">
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-white">${id}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-gray-400">${location}</td>
                        <td class="px-6 py-4 whitespace-nowrap flex items-center ${statusTextColor}">
                            <span class="${statusClass}"></span> ${status}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${lastSeen}</td>
                    </tr>
                `;
            });
            updateStatus.innerText = '最後更新: ' + new Date().toLocaleTimeString();
        } catch (error) {
            console.error('Fetch error:', error);
            updateStatus.innerText = '錯誤: 無法讀取資料';
        }
    }

    fetchData();
    setInterval(fetchData, 30000); 
</script>
</body>
</html>
