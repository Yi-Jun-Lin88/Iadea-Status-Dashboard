<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taipei Parking Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dot-online { @apply h-2.5 w-2.5 rounded-full bg-green-500 mr-2 animate-pulse; }
        .dot-offline { @apply h-2.5 w-2.5 rounded-full bg-red-500 mr-2; }
        /* 讓表格在手機上可以橫向捲動 */
        .table-container { overflow-x: auto; }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-100 font-sans p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Pay.taipei 停車場監控</h1>
                <p class="text-blue-400 font-medium">Data Source: 臺北市開放資料實時串接 (Open Data)</p>
            </div>
            <div id="last-update" class="bg-slate-800 px-4 py-2 rounded-full text-xs font-mono text-slate-400 border border-slate-700">
                正在初始化...
            </div>
        </header>

        <div class="mb-6">
            <input type="text" id="search-input" placeholder="搜尋停車場名稱或地址..."
                   class="w-full md:w-96 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
        </div>

        <div class="table-container rounded-xl border border-slate-700 shadow-2xl bg-slate-900">
            <table class="min-w-full divide-y divide-slate-700">
                <thead class="bg-slate-800/50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-300 uppercase">停車場名稱</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-300 uppercase text-center">服務狀態</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-300 uppercase">營運單位</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-300 uppercase">地址</th>
                    </tr>
                </thead>
                <tbody id="parking-table" class="divide-y divide-slate-800">
                    <tr>
                        <td colspan="4" class="px-6 py-12 text-center text-slate-500 animate-pulse">
                            正在從臺北市政府伺服器同步數據...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 使用 CORS Proxy 解決瀏覽器跨網域抓取問題
        const RAW_URL = 'https://data.taipei/api/frontstage/tpeod/dataset/resource.download?rid=c0408caa-b6ae-47e7-b4e9-1d806afd69c2';
        const PROXY_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(RAW_URL);

        let allData = [];

        async function fetchData() {
            const tableBody = document.getElementById('parking-table');
            const updateStatus = document.getElementById('last-update');

            try {
                // 抓取資料
                const response = await fetch(PROXY_URL);
                if (!response.ok) throw new Error('API 請求失敗');

                const text = await response.text();

                // 解析 CSV (處理換行與欄位)
                const rows = text.split(/\r?\n/).filter(row => row.trim() !== '');
                const headers = rows[0].split(',');

                // 將資料轉為物件陣列，方便後續搜尋與顯示
                allData = rows.slice(1).map(row => {
                    const cols = row.split(',');
                    return {
                        name: cols[5],     // 對應停車場
                        status: cols[6],   // 狀態
                        operator: cols[4], // 營運單位
                        address: cols[9]   // 地址
                    };
                });

                renderTable(allData);
                updateStatus.innerText = '最後同步: ' + new Date().toLocaleTimeString();

            } catch (error) {
                console.error('Fetch Error:', error);
                updateStatus.innerText = '同步失敗';
                tableBody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-red-400">數據抓取異常，請檢查網路連線。</td></tr>`;
            }
        }

        function renderTable(data) {
            const tableBody = document.getElementById('parking-table');
            tableBody.innerHTML = '';

            data.forEach(item => {
                // 判斷狀態：1 或 開啟 為正常
                const isActive = item.status === "1" || item.status === "開啟";
                const statusLabel = isActive ? '服務中' : '維護中';
                const statusClass = isActive ? 'dot-online' : 'dot-offline';
                const textColor = isActive ? 'text-green-400' : 'text-red-400';

                tableBody.innerHTML += `
                    <tr class="hover:bg-slate-800/50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap font-semibold text-slate-100">${item.name || '未命名'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center">
                            <span class="inline-flex items-center ${textColor} bg-slate-900/50 px-3 py-1 rounded-full text-xs border border-slate-700">
                                <span class="${statusClass}"></span> ${statusLabel}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-400">${item.operator}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${item.address}</td>
                    </tr>
                `;
            });
        }

        // 搜尋邏輯
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allData.filter(item =>
                (item.name && item.name.toLowerCase().includes(term)) ||
                (item.address && item.address.toLowerCase().includes(term))
            );
            renderTable(filtered);
        });

        // 初始化與定時更新
        fetchData();
        setInterval(fetchData, 600000); // 10分鐘更新一次，減少 Proxy 負擔
    </script>
</body>
</html>
